<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#123a63" />
<title>인주회중 야외봉사 앱 v4.0</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Malgun Gothic',sans-serif;background:#eef3f8;color:#102033}.app{max-width:460px;margin:0 auto;min-height:100vh;background:#f7fbff}.screen{display:none;padding:14px}.screen.active{display:block}.top{background:#123a63;color:white;border-radius:0 0 24px 24px;padding:18px 16px 16px}.brand{display:flex;justify-content:space-between;align-items:center}.jw{font-weight:900;border:2px solid #fff;border-radius:8px;padding:4px 8px;letter-spacing:.5px}.hamb{font-size:26px}.title{font-size:24px;font-weight:900;margin:18px 0 6px}.verse{opacity:.95;font-size:15px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.stat{background:white;color:#123a63;border-radius:14px;padding:10px 4px;text-align:center;box-shadow:0 2px 8px #0001}.stat b{display:block;font-size:20px}.stat span{font-size:12px}.card{background:white;border-radius:22px;padding:15px;margin:13px 0;box-shadow:0 4px 14px #1241}.menus{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.btn{border:0;border-radius:18px;padding:15px 10px;font-size:18px;font-weight:900;background:#e8f1fb;color:#123a63}.btn.primary{background:#123a63;color:#fff}.btn.green{background:#dff6e8;color:#116333}.btn.red{background:#ffe4e4;color:#9a1d1d}.btn.yellow{background:#fff3cd;color:#6b4a00}.btn.gray{background:#edf0f4;color:#334}.btn:active{transform:scale(.98)}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.quick .btn{font-size:14px;padding:12px 4px}.notice{font-size:15px;line-height:1.55;background:#f1f7ff;border-left:5px solid #123a63;border-radius:12px;padding:10px}.footer{position:sticky;bottom:0;background:#123a63;color:white;padding:10px 14px;display:flex;gap:8px;justify-content:space-around;border-radius:18px 18px 0 0}.footer button{background:transparent;color:white;border:0;font-weight:800}.back{background:#e8f1fb;border:0;border-radius:14px;padding:10px 14px;font-weight:900;color:#123a63}.headrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}.h1{font-size:22px;font-weight:900;flex:1}.inputrow{display:flex;gap:8px}.inputrow input,textarea,select{width:100%;border:2px solid #d5e0ec;border-radius:14px;padding:13px;font-size:16px}ul{padding-left:0;list-style:none}.person{display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid #eee}.person b{flex:1}.small{font-size:13px;color:#667}.pairs{display:grid;gap:8px}.pair{background:#f2f7ff;border-radius:14px;padding:10px;font-weight:800}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.area{padding:13px;border-radius:15px;border:0;background:#fff;border:2px solid #d8e2ec;font-weight:900;font-size:16px}.houses{display:grid;gap:10px}.house{background:white;border-radius:16px;padding:12px;box-shadow:0 2px 9px #0001}.houseTop{display:flex;justify-content:space-between;font-weight:900}.status{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:9px}.status button{border:0;border-radius:10px;padding:10px 2px;font-weight:800}.done{background:#dff6e8}.absent{background:#fff3cd}.reject{background:#ffe1e1}.etc{background:#e9edf2}.pill{display:inline-block;border-radius:999px;background:#e8f1fb;color:#123a63;padding:4px 8px;font-size:12px}.progress{height:12px;background:#e3e8ef;border-radius:999px;overflow:hidden}.bar{height:100%;background:#123a63;width:0}.modal{position:fixed;inset:0;background:#0008;display:none;align-items:center;justify-content:center;padding:20px}.modal.on{display:flex}.modalbox{background:white;border-radius:22px;padding:18px;max-width:420px;width:100%}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active">
 <div class="top"><div class="brand"><div class="jw" onclick="location.href='https://www.jw.org/ko/'">JW.ORG</div><div class="hamb" onclick="show('settings')">☰</div></div><div class="title">인주회중 야외봉사 앱</div><div class="verse">즐거운 마음으로 봉사합시다. - 마태 24:14</div><div class="stats"><div class="stat"><b id="sPeople">0</b><span>참석</span></div><div class="stat"><b id="sPairs">0</b><span>짝</span></div><div class="stat"><b id="sDone">0</b><span>완료</span></div><div class="stat"><b id="sRate">0%</b><span>진행률</span></div></div></div>
 <div class="card menus"><button class="btn" onclick="show('people')">👥 참여자</button><button class="btn" onclick="show('areas')">🗺️ 구역방문</button><button class="btn" onclick="show('visit')">🏠 호별방문</button><button class="btn" onclick="show('cars')">🚗 차량</button></div>
 <div class="card"><div class="quick"><button class="btn red" onclick="sos()">🚨 SOS</button><button class="btn" onclick="show('stats')">📊 통계</button><button class="btn" onclick="show('settings')">⚙ 설정</button><button class="btn green" id="startBtn" onclick="startService()">▶ 시작</button></div></div>
 <div class="card"><b>공지사항</b><div class="notice" id="notice">오늘도 안전하게 봉사합시다. 짝 마련 후 시작 버튼을 눌러주세요.</div></div>
 <div class="footer"><button onclick="show('home')">홈</button><button onclick="show('people')">참여자</button><button onclick="show('areas')">구역</button><button onclick="sos()">SOS</button></div>
</section>
<section id="people" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">참여자</div></div><div class="card"><div class="inputrow"><input id="pname" placeholder="이름 입력"><button class="btn primary" onclick="addPerson()">참석</button></div><div class="small">참석자는 자동 저장됩니다.</div></div><div class="card"><b>참석 명단</b><ul id="peopleList"></ul></div><div class="card grid3"><button class="btn yellow" onclick="makePairs()">짝 마련</button><button class="btn green" onclick="startService()">시작</button><button class="btn red" onclick="endService()">종료</button></div><div class="card"><b>짝 현황</b><div id="pairList" class="pairs"></div></div></section>
<section id="areas" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">구역방문</div></div><div class="card grid3" id="areaButtons"></div><div class="card"><b id="selectedArea">선택된 구역: 걸매리</b><p class="small">구역 선택 후 호별방문으로 이동하세요.</p><button class="btn primary" onclick="show('visit')">호별방문 열기</button></div></section>
<section id="visit" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">호별방문</div></div><div class="card"><b id="visitTitle">걸매리</b><div class="progress"><div class="bar" id="visitBar"></div></div><div class="small" id="visitText"></div></div><div class="houses" id="houses"></div></section>
<section id="cars" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">차량</div></div><div class="card"><div class="inputrow"><input id="driver" placeholder="운전자"><input id="seats" type="number" placeholder="좌석" value="4"></div><button class="btn primary" onclick="addCar()">차량 등록</button></div><div class="card"><ul id="carList"></ul></div></section>
<section id="stats" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">통계</div></div><div class="card" id="statBox"></div></section>
<section id="settings" class="screen"><div class="headrow"><button class="back" onclick="show('home')">←</button><div class="h1">설정</div></div><div class="card"><textarea id="noticeEdit" rows="4"></textarea><button class="btn primary" onclick="saveNotice()">공지 저장</button></div><div class="card grid3"><button class="btn" onclick="backup()">백업</button><button class="btn yellow" onclick="resetToday()">오늘 초기화</button><button class="btn red" onclick="localStorage.clear();location.reload()">전체삭제</button></div><div class="small">v4.0 Sprint 1 실행본</div></section>
</div>
<div class="modal" id="modal"><div class="modalbox"><div id="modalText"></div><button class="btn primary" onclick="modal.classList.remove('on')">확인</button></div></div>
<script>
const areas=['걸매리','문방리','대음리','도흥리','해암리','금성리','관암리','공세리','밀두리','아산리'];
const defaultHouses=Array.from({length:12},(_,i)=>({no:i+1,status:'',memo:''}));
let data=JSON.parse(localStorage.getItem('inju_v4')||'{}');
data.people??=[];data.pairs??=[];data.cars??=[];data.area??='걸매리';data.houses??={};data.notice??='오늘도 안전하게 봉사합시다. 짝 마련 후 시작 버튼을 눌러주세요.';data.started??=false;
function save(){localStorage.setItem('inju_v4',JSON.stringify(data));render()}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');render()}
function addPerson(){let n=pname.value.trim();if(!n)return; if(!data.people.includes(n))data.people.push(n);pname.value='';save()}
function removePerson(n){data.people=data.people.filter(x=>x!==n);data.pairs=[];save()}
function makePairs(){let arr=[...data.people];data.pairs=[];while(arr.length){data.pairs.push(arr.splice(0,2))}save()}
function startService(){if(data.people.length===0)return alert('참석자를 먼저 입력해 주세요.'); if(data.pairs.length===0)return alert('짝 마련을 먼저 해 주세요.');data.started=true;save();alert('봉사를 시작합니다.')}
function endService(){data.started=false;save();alert('모두 안전하게 마쳤습니다. 안전확인과 기타사항을 확인해 주세요.')}
function selectArea(a){data.area=a;save();show('areas')}
function houses(){return data.houses[data.area]??(data.houses[data.area]=JSON.parse(JSON.stringify(defaultHouses)))}
function setStatus(i,st){houses()[i].status=st;save()}
function addCar(){let d=driver.value.trim();let s=seats.value||4;if(!d)return;data.cars.push({driver:d,seats:s});driver.value='';save()}
function delCar(i){data.cars.splice(i,1);save()}
function saveNotice(){data.notice=noticeEdit.value;save()}
function sos(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>pop(`🚨 SOS<br>현재 위치<br>위도: ${pos.coords.latitude.toFixed(6)}<br>경도: ${pos.coords.longitude.toFixed(6)}<br><br><button class='btn' onclick="location.href='https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}'">지도 열기</button>`),()=>pop('위치 권한이 필요합니다.'))}else pop('GPS를 지원하지 않는 기기입니다.')}
function pop(t){modalText.innerHTML=t;modal.classList.add('on')}
function backup(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='inju_backup.json';a.click()}
function resetToday(){if(confirm('오늘 참석자, 짝, 차량을 초기화할까요?')){data.people=[];data.pairs=[];data.cars=[];data.started=false;save()}}
function render(){sPeople.textContent=data.people.length;sPairs.textContent=data.pairs.length;let all=areas.length*12,done=0;areas.forEach(a=>(data.houses[a]||[]).forEach(h=>{if(h.status==='방문')done++}));sDone.textContent=done;sRate.textContent=Math.round(done/all*100)+'%';notice.textContent=data.notice;noticeEdit.value=data.notice;peopleList.innerHTML=data.people.map(n=>`<li class='person'><b>${n}</b><button class='btn gray' onclick="removePerson('${n}')">취소</button></li>`).join('')||'<li class="small">아직 참석자가 없습니다.</li>';pairList.innerHTML=data.pairs.map((p,i)=>`<div class='pair'>${i+1}조: ${p.join(' · ')}</div>`).join('')||'<div class="small">짝 마련 전입니다.</div>';areaButtons.innerHTML=areas.map(a=>`<button class='area' onclick="selectArea('${a}')">${a}</button>`).join('');selectedArea.textContent='선택된 구역: '+data.area;visitTitle.textContent=data.area;let hs=houses();let vd=hs.filter(h=>h.status==='방문').length;visitBar.style.width=Math.round(vd/hs.length*100)+'%';visitText.textContent=`방문 완료 ${vd}/${hs.length}`;housesEl= document.getElementById('houses');housesEl.innerHTML=hs.map((h,i)=>`<div class='house'><div class='houseTop'><span>${data.area} ${h.no}번</span><span class='pill'>${h.status||'미방문'}</span></div><div class='status'><button class='done' onclick="setStatus(${i},'방문')">방문</button><button class='absent' onclick="setStatus(${i},'부재')">부재</button><button class='reject' onclick="setStatus(${i},'거절')">거절</button><button class='etc' onclick="setStatus(${i},'기타')">기타</button></div></div>`).join('');carList.innerHTML=data.cars.map((c,i)=>`<li class='person'><b>${c.driver}</b><span>${c.seats}석</span><button class='btn gray' onclick='delCar(${i})'>삭제</button></li>`).join('')||'<li class="small">등록된 차량이 없습니다.</li>';statBox.innerHTML=`<p>참석자: <b>${data.people.length}</b>명</p><p>짝: <b>${data.pairs.length}</b>조</p><p>방문 완료: <b>${done}</b>집</p><p>전체 진행률: <b>${Math.round(done/all*100)}%</b></p><p>봉사 상태: <b>${data.started?'진행중':'대기'}</b></p>`}
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}render();
</script>
</body></html>
